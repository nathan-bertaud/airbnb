<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Où séjourner à Bagnères-de-Bigorre ?</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #ffffff;
    --bg2:      #f7f6f3;
    --bg3:      #efefec;
    --bg-info:  #e6f1fb;
    --bg-ok:    #eaf3de;
    --bg-warn:  #faeeda;
    --bg-err:   #fcebeb;
    --text:     #1a1a18;
    --text2:    #5f5e5a;
    --text3:    #888780;
    --info:     #185fa5;
    --ok:       #3b6d11;
    --warn:     #854f0b;
    --err:      #a32d2d;
    --border:   rgba(0,0,0,0.11);
    --border2:  rgba(0,0,0,0.20);
    --b-info:   #85b7eb;
    --b-ok:     #97c459;
    --b-warn:   #ef9f27;
    --r:        8px;
    --rl:       12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #1e1e1c;
      --bg2:      #272725;
      --bg3:      #2f2f2c;
      --bg-info:  #0c447c;
      --bg-ok:    #27500a;
      --bg-warn:  #633806;
      --bg-err:   #501313;
      --text:     #f1efe8;
      --text2:    #b4b2a9;
      --text3:    #888780;
      --info:     #85b7eb;
      --ok:       #97c459;
      --warn:     #ef9f27;
      --err:      #f09595;
      --border:   rgba(255,255,255,0.10);
      --border2:  rgba(255,255,255,0.18);
      --b-info:   #185fa5;
      --b-ok:     #3b6d11;
      --b-warn:   #854f0b;
    }
  }

  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
    font-size: 15px;
    line-height: 1.5;
  }

  .container { max-width: 1080px; margin: 0 auto; }

  /* Header */
  .hdr { padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; }
  .hdr h1 { font-size: 22px; font-weight: 600; color: var(--text); }
  .hdr p  { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* Banner prenom */
  .banner {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--rl);
    padding: .875rem 1.125rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .banner label { font-size: 14px; color: var(--text2); white-space: nowrap; font-weight: 500; }
  .banner input {
    flex: 1;
    min-width: 120px;
    max-width: 200px;
    padding: 7px 11px;
    border: 0.5px solid var(--border2);
    border-radius: var(--r);
    background: var(--bg2);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
  }
  .banner input:focus { border-color: var(--b-info); }
  .banner .hint { font-size: 12px; color: var(--text3); flex: 1; min-width: 130px; }
  .sync { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); margin-left: auto; }
  .dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--warn); transition: background .3s; flex-shrink: 0; }
  .dot.ok  { background: var(--ok); }
  .dot.err { background: var(--err); }

  /* Section label */
  .slbl { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin: 1.1rem 0 .65rem; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

  /* Card */
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--rl);
    overflow: hidden;
    transition: border-color .15s, box-shadow .15s;
  }
  .card:hover { border-color: var(--border2); box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .card.voted { border: 1.5px solid var(--b-info); }

  .card-emo {
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    background: var(--bg2);
  }
  .card-body { padding: 11px 13px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.35; }

  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0 7px; }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--bg-info);
    color: var(--info);
    border: 0.5px solid var(--b-info);
    font-weight: 500;
  }
  .tag.spa  { background: var(--bg-ok);   color: var(--ok);   border-color: var(--b-ok); }
  .tag.prix { background: var(--bg-warn); color: var(--warn); border-color: var(--b-warn); }

  .card-meta { font-size: 11px; color: var(--text3); margin-bottom: 7px; }
  .card-desc { font-size: 12px; color: var(--text2); line-height: 1.55; margin-bottom: 8px; }
  .card-link { font-size: 11px; color: var(--info); text-decoration: none; display: block; margin-bottom: 9px; }
  .card-link:hover { text-decoration: underline; }

  .card-foot {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 9px;
    border-top: 0.5px solid var(--border);
  }
  .bar-wrap { flex: 1; }
  .vote-count { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
  .bar-bg  { height: 3px; background: var(--bg3); border-radius: 2px; }
  .bar-fg  { height: 3px; background: var(--info); border-radius: 2px; transition: width .4s; }
  .voters  { font-size: 9px; color: var(--text3); margin-top: 3px; min-height: 12px; }

  .btn-vote {
    font-size: 12px;
    padding: 6px 13px;
    border-radius: var(--r);
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: background .12s, transform .1s;
  }
  .btn-vote:hover   { background: var(--bg2); }
  .btn-vote:active  { transform: scale(.97); }
  .btn-vote.voted   { background: var(--bg-info); color: var(--info); border-color: var(--b-info); }
  .btn-vote.voted:hover { background: var(--bg-err); color: var(--err); border-color: #f09595; }
  .btn-vote:disabled { opacity: .4; cursor: default; transform: none; }

  /* Classement */
  .res {
    margin-top: 1.25rem;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--rl);
    padding: .875rem 1.125rem;
  }
  .res h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .rrow { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 0; }
  .rrow .med { font-size: 16px; width: 20px; text-align: center; }
  .rrow .nm  { flex: 1; color: var(--text); }
  .rrow .sc  { color: var(--text2); font-weight: 500; }

  /* Toast */
  .toast-wrap { height: 38px; display: flex; align-items: center; justify-content: center; margin-top: .5rem; }
  .toast {
    background: var(--bg);
    border: 0.5px solid var(--border2);
    border-radius: var(--r);
    padding: 6px 18px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity .2s;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .toast.show { opacity: 1; }

  /* Erreur */
  .err-box {
    background: var(--bg-err);
    border: 0.5px solid #f09595;
    border-radius: var(--r);
    padding: 11px 15px;
    font-size: 13px;
    color: var(--err);
    margin-bottom: 1rem;
  }

  .note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 0.5px solid var(--border); }
</style>
</head>
<body>
<div class="container">

  <div class="hdr">
    <h1>🏠 Où séjourner à Bagnères-de-Bigorre ?</h1>
    <p>Vote pour ton logement préféré · 6 personnes · 3 chambres · Pyrénées</p>
  </div>

  <div class="banner">
    <label for="pi">Ton prénom pour voter :</label>
    <input type="text" id="pi" placeholder="Ex : Nathan" maxlength="30" />
    <span class="hint">Entre ton prénom puis clique sur « Je vote »</span>
    <span class="sync">
      <span class="dot" id="dot"></span>
      <span id="slbl">Connexion...</span>
    </span>
  </div>

  <div id="err-box"></div>
  <div class="slbl">Sélection</div>
  <div id="grid" class="grid"></div>

  <div id="res" class="res" style="display:none">
    <h3>Classement actuel</h3>
    <div id="rl"></div>
  </div>

  <div class="toast-wrap"><div class="toast" id="toast"></div></div>
  <p class="note">Votes synchronisés en temps réel · 1 vote par personne par logement</p>

</div>
<script src="logements.js"></script>
<script>

var DB = 'https://airbnb-f3ec8-default-rtdb.europe-west1.firebasedatabase.app';
var votes = {}, ready = false;

function toast(m) {
  var t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function setSync(cls, lbl) {
  document.getElementById('dot').className = 'dot ' + cls;
  document.getElementById('slbl').textContent = lbl;
}

function showErr(m) {
  document.getElementById('err-box').innerHTML = '<div class="err-box">⚠️ ' + m + '</div>';
}

function prenom() { return (document.getElementById('pi').value || '').trim(); }

function maxV() {
  return Math.max(1, Math.max.apply(null, LOGEMENTS.map(function(l){ return Object.keys(votes[l.id] || {}).length; })));
}

function render() {
  var p = prenom().toLowerCase(), mx = maxV();
  document.getElementById('grid').innerHTML = LOGEMENTS.map(function(l) {
    var obj = votes[l.id] || {}, lst = Object.values(obj), cnt = lst.length;
    var vd = p && lst.map(function(v){ return v.toLowerCase(); }).indexOf(p) !== -1;
    var pct = Math.round(cnt / mx * 100);
    var dp = cnt > 0 ? lst.slice(0, 4).join(', ') + (cnt > 4 ? ' +' + (cnt - 4) : '') : '';
    var th = l.t.map(function(tg) {
      var c = /jacuzzi|piscine|spa/i.test(tg) ? ' spa' : tg.toLowerCase().includes('prix') || tg.toLowerCase().includes('meilleur') ? ' prix' : '';
      return '<span class="tag' + c + '">' + tg + '</span>';
    }).join('');
    return '<div class="card' + (vd ? ' voted' : '') + '">' +
      '<div class="card-emo">' + l.e + '</div>' +
      '<div class="card-body">' +
        '<div class="card-title">' + l.n + '</div>' +
        '<div class="tags">' + th + '</div>' +
        '<div class="card-meta">' + l.note + ' &nbsp;·&nbsp; ' + l.cap + ' &nbsp;·&nbsp; ' + l.px + '</div>' +
        '<div class="card-desc">' + l.d + '</div>' +
        '<a href="' + l.url + '" target="_blank" class="card-link">Voir sur Airbnb →</a>' +
        '<div class="card-foot">' +
          '<div class="bar-wrap">' +
            '<div class="vote-count">' + cnt + ' vote' + (cnt > 1 ? 's' : '') + '</div>' +
            '<div class="bar-bg"><div class="bar-fg" style="width:' + pct + '%"></div></div>' +
            '<div class="voters">' + dp + '</div>' +
          '</div>' +
          '<button class="btn-vote' + (vd ? ' voted' : '') + '"' + (ready ? '' : ' disabled') + ' onclick="' + (vd ? 'doUnvote' : 'doVote') + '(\'' + l.id + '\')">' +
            (vd ? '✓ Voté' : 'Je vote') +
          '</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var sorted = LOGEMENTS.slice().sort(function(a, b) {
    return Object.keys(votes[b.id] || {}).length - Object.keys(votes[a.id] || {}).length;
  });
  var top = sorted.filter(function(l){ return Object.keys(votes[l.id] || {}).length > 0; }).slice(0, 3);
  var res = document.getElementById('res');
  if (!top.length) { res.style.display = 'none'; return; }
  res.style.display = '';
  var medals = ['🥇', '🥈', '🥉'];
  document.getElementById('rl').innerHTML = top.map(function(l, i) {
    var n = Object.keys(votes[l.id] || {}).length;
    return '<div class="rrow"><span class="med">' + medals[i] + '</span><span class="nm">' + l.n + '</span><span class="sc">' + n + ' vote' + (n > 1 ? 's' : '') + '</span></div>';
  }).join('');
}

async function loadVotes() {
  var r = await fetch(DB + '/votes.json');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  var d = await r.json();
  votes = d || {};
}

async function poll() {
  try {
    await loadVotes();
    setSync('ok', 'Connecté · temps réel');
    render();
  } catch(e) {
    setSync('err', 'Erreur réseau');
  }
  setTimeout(poll, 4000);
}

async function doUnvote(id) {
  var p = prenom();
  if (!p) { toast('Entre ton prénom !'); document.getElementById('pi').focus(); return; }
  if (!ready) { toast('Connexion en cours...'); return; }
  var pl = p.toLowerCase();
  var obj = votes[id] || {};
  var key = Object.keys(obj).find(function(k){ return obj[k].toLowerCase() === pl; });
  if (!key) { toast('Vote introuvable.'); return; }
  delete votes[id][key];
  render();
  try {
    var r = await fetch(DB + '/votes/' + id + '/' + key + '.json', { method: 'DELETE' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    toast('Vote annulé pour ' + p + '.');
  } catch(e) {
    toast('Erreur réseau, réessaie.');
    votes[id][key] = p;
    render();
  }
}

async function doVote(id) {
  var p = prenom();
  if (!p) { toast('Entre ton prénom avant de voter !'); document.getElementById('pi').focus(); return; }
  if (!ready) { toast('Connexion en cours...'); return; }
  var pl = p.toLowerCase();
  if (Object.values(votes[id] || {}).map(function(v){ return v.toLowerCase(); }).indexOf(pl) !== -1) {
    toast(p + ', tu as déjà voté pour ce logement !'); return;
  }
  var key = 'v' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  if (!votes[id]) votes[id] = {};
  votes[id][key] = p;
  render();
  try {
    var r = await fetch(DB + '/votes/' + id + '/' + key + '.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(p)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    toast('✓ Vote enregistré pour ' + p + ' !');
  } catch(e) {
    toast('Erreur réseau, réessaie.');
    delete votes[id][key];
    render();
  }
}

document.getElementById('pi').addEventListener('input', render);
render();

loadVotes().then(function() {
  ready = true;
  setSync('ok', 'Connecté');
  render();
  setTimeout(poll, 4000);
}).catch(function(e) {
  showErr('Impossible de se connecter à Firebase : ' + e.message + '. Vérifie que les règles sont en mode test (.read et .write à true).');
  setSync('err', 'Erreur');
  ready = true;
  render();
});
</script>
</body>
</html>
